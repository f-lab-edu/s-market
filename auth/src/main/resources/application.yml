server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smarket
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

resilience4j.circuitbreaker:
  instances:
    userService:
      failureRateThreshold: 50
      slidingWindowSize: 20
      waitDurationInOpenState: 3s

